  panel.innerHTML = `
    <div style="padding:20px 0">

      <div class="filters" style="margin-bottom:16px">
        <button id="trendBackBtn" onclick="filterByCat('')"
          style="display:none;padding:6px 14px;border-radius:7px;font-size:11px;cursor:pointer;
                 border:1px solid var(--accent);background:transparent;color:var(--accent);
                 font-family:'JetBrains Mono',monospace;transition:all .15s"
          onmouseenter="this.style.background='var(--accent)';this.style.color='#000'"
          onmouseleave="this.style.background='transparent';this.style.color='var(--accent)'">
          ← Всі категорії
        </button>
        <span class="filter-label">Від:</span>
        <input type="date" class="filter-select" id="trendFrom" value="${minD}" onchange="onTrendFilterChange()">
        <span class="filter-label">До:</span>
        <input type="date" class="filter-select" id="trendTo"   value="${maxD}" onchange="onTrendFilterChange()">
        <span class="filter-label">Категорія:</span>
        <select class="filter-select" id="trendCat" onchange="onTrendCatChange()">
          <option value="">Всі категорії</option>
          ${catOptions}
        </select>
        <span class="filter-label" id="trendTopNLabel">Ключів на графіку:</span>
        <select class="filter-select" id="trendTopN" onchange="buildTrendsChart()">
          <option value="5">Топ 5</option>
          <option value="10" selected>Топ 10</option>
          <option value="20">Топ 20</option>
        </select>
        <input class="search-input" id="trendSearch" placeholder="Пошук ключа..." oninput="buildTrendsTable()" style="width:200px">
      </div>

      <!-- Виділений ключ -->
      <div id="trendSelectedBadge" style="display:none;margin-bottom:12px;align-items:center;gap:10px">
        <span style="font-size:11px;color:var(--muted)">Ключ:</span>
        <span id="trendSelectedName" style="color:var(--accent);font-weight:700;font-size:13px"></span>
        <button onclick="clearSelectedKw()"
          style="padding:2px 10px;border-radius:4px;font-size:10px;cursor:pointer;
                 border:1px solid var(--warn);background:transparent;color:var(--warn);
                 font-family:'JetBrains Mono',monospace">✕ очистити</button>
      </div>

      <!-- Графік -->
      <div class="table-wrap" style="margin-bottom:12px">
        <div class="table-header">
          <span class="table-title" id="trendsChartTitle">Динаміка Google Trends (тижнева)</span>
          <span class="table-count" id="trendsChartInfo"></span>
        </div>
        <div style="padding:20px;position:relative;height:420px">
          <canvas id="chTrends"></canvas>
        </div>
      </div>

      <div id="trendKwToggles" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;padding:2px 0"></div>

      <!-- Пов'язані запити (показується коли обраний конкретний ключ) -->
      <div id="trendRelatedPanel" style="display:none;margin-bottom:20px"></div>

      <!-- Плитки категорій (показуються коли категорія не вибрана) -->
      <div id="trendCatGrid" style="margin-bottom:20px"></div>

      <!-- Таблиця ключів -->
      <div class="table-wrap">
        <div class="table-header">
          <span class="table-title">Ключові слова</span>
          <span class="table-count" id="trendsTableCount"></span>
        </div>
        <div id="trendsTableBody"></div>
      </div>

    </div>`;

  buildTrendsChart();
  buildTrendsTable();
  buildCatGrid();
}

function onTrendFilterChange() {
  buildTrendsChart();
  buildTrendsTable();
}

function onTrendCatChange() {
  const cat = document.getElementById('trendCat')?.value || '';
  const backBtn = document.getElementById('trendBackBtn');
  if (backBtn) backBtn.style.display = cat ? '' : 'none';
  _selectedKw = null;
  _hideSelectedBadge();
  _showTopNControls(true);
  const rp = document.getElementById('trendRelatedPanel');
  if (rp) rp.style.display = 'none';
  buildTrendsChart();
  buildTrendsTable();
  buildCatGrid();
}

function _hideSelectedBadge() {
  const b = document.getElementById('trendSelectedBadge');
  if (b) b.style.display = 'none';
}
function _showTopNControls(visible) {
  const lbl = document.getElementById('trendTopNLabel');
  const sel = document.getElementById('trendTopN');
  if (lbl) lbl.style.display = visible ? '' : 'none';
  if (sel) sel.style.display = visible ? '' : 'none';
}

window.selectKeyword = kw => {
  _selectedKw = kw;
  const badge = document.getElementById('trendSelectedBadge');
  const name  = document.getElementById('trendSelectedName');
  if (badge) badge.style.display = 'flex';
  if (name)  name.textContent = kw;
  _showTopNControls(false);
  buildTrendsChart();
  buildRelatedPanel(kw);
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.clearSelectedKw = () => {
  _selectedKw = null;
  _hideSelectedBadge();
  _showTopNControls(true);
  buildTrendsChart();
  const rp = document.getElementById('trendRelatedPanel');
  if (rp) rp.style.display = 'none';
};

window.filterByCat = cat => {
  const sel = document.getElementById('trendCat');
  if (!sel) return;
  for (const opt of sel.options) {
    if (opt.value === cat) { sel.value = cat; break; }
  }
  onTrendCatChange();
};

async function buildRelatedPanel(kw) {
  const el = document.getElementById('trendRelatedPanel');
  if (!el) return;

  el.style.display = '';
  el.innerHTML = '<div style="padding:12px 20px;color:var(--muted);font-size:11px">Завантажуємо пов\'язані запити...</div>';

  // Ледаче завантаження
  if (_relatedRaw === null) {
    try {
      _relatedRaw = await fetchCSV('silpo_keywords_related');
    } catch(e) {
      el.innerHTML = `<div style="padding:12px 20px;font-size:11px;color:var(--warn)">Лист silpo_keywords_related не знайдено — спочатку запусти trends.py</div>`;
      return;
    }
  }

  const rows = (_relatedRaw || []).filter(r => r.keyword === kw);
  if (!rows.length) {
    el.innerHTML = `<div style="padding:12px 20px;font-size:11px;color:var(--muted)">Пов'язані запити відсутні для «${kw}»</div>`;
    return;
  }

  const top    = rows.filter(r => r.query_type === 'top')
                     .sort((a,b) => (parseInt(b.value)||0) - (parseInt(a.value)||0))
                     .slice(0, 5);
  const rising = rows.filter(r => r.query_type === 'rising')
                     .slice(0, 5);

  const chipTop = q => {
    const v = parseInt(q.value) || 0;
    const w = v ? Math.max(10, v) : 10;
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(42,42,56,.4)">
      <span style="flex:1;font-size:12px;color:var(--text)">${q.related_query}</span>
      <div style="width:80px;height:3px;background:var(--border);border-radius:2px;flex-shrink:0">
        <div style="width:${w}%;height:3px;background:var(--accent2);border-radius:2px"></div>
      </div>
      <span style="font-size:11px;color:var(--accent2);min-width:28px;text-align:right;font-variant-numeric:tabular-nums">${v || '—'}</span>
      <a href="https://trends.google.com/trends/explore?q=${encodeURIComponent(q.related_query)}&geo=UA"
         target="_blank" style="font-size:10px;color:var(--muted);text-decoration:none;flex-shrink:0"
         title="Відкрити в Google Trends">↗</a>
    </div>`;
  };

  const chipRising = q => {
    const isBreakout = String(q.value).toLowerCase().includes('breakout');
    const badge = isBreakout
      ? `<span style="font-size:9px;background:rgba(0,229,160,.15);color:var(--accent);border:1px solid rgba(0,229,160,.3);border-radius:3px;padding:1px 6px;white-space:nowrap">🔥 Breakout</span>`
      : `<span style="font-size:11px;color:var(--accent);font-variant-numeric:tabular-nums">+${q.value}%</span>`;
    return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid rgba(42,42,56,.4)">
      <span style="flex:1;font-size:12px;color:var(--text)">${q.related_query}</span>
      ${badge}
      <a href="https://trends.google.com/trends/explore?q=${encodeURIComponent(q.related_query)}&geo=UA"
         target="_blank" style="font-size:10px;color:var(--muted);text-decoration:none;flex-shrink:0"
         title="Відкрити в Google Trends">↗</a>
    </div>`;
  };

  el.innerHTML = `
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">Пов'язані запити — ${kw}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
        <div style="padding:14px 20px;border-right:1px solid var(--border)">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
            Топ запити <span style="color:var(--accent2)">(за інтересом 0–100)</span>
          </div>
          ${top.length ? top.map(chipTop).join('') : '<div style="font-size:11px;color:var(--muted)">Немає даних</div>'}
        </div>
        <div style="padding:14px 20px">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
            Зростаючі запити <span style="color:var(--accent)">(швидкий ріст)</span>
          </div>
          ${rising.length ? rising.map(chipRising).join('') : '<div style="font-size:11px;color:var(--muted)">Немає даних</div>'}
        </div>
      </div>
    </div>`;
}

function _trendsFiltered() {
  const from   = document.getElementById('trendFrom')?.value || '';
  const to     = document.getElementById('trendTo')?.value   || '';
  const parCat = document.getElementById('trendCat')?.value  || '';
  return (_trendsRaw || []).filter(r => {
    if (!r.keyword || !r.week_date) return false;   // пропускаємо порожні рядки CSV
    if (from   && r.week_date < from)             return false;
    if (to     && r.week_date > to)               return false;
    if (parCat && r.parent_category !== parCat)   return false;
    return true;
  });
}

function buildTrendsChart() {
  const data  = _trendsFiltered();
  const weeks = [...new Set(data.map(r => r.week_date).filter(Boolean))].sort();

  const kwMap = {};
  data.forEach(r => {
    if (!kwMap[r.keyword]) kwMap[r.keyword] = {};
    kwMap[r.keyword][r.week_date] = parseInt(r.value) || 0;
  });

  let topKws;
  const titleEl = document.getElementById('trendsChartTitle');

  if (_selectedKw && kwMap[_selectedKw]) {
    topKws = [_selectedKw];
    if (titleEl) titleEl.textContent = `Тренд: ${_selectedKw}`;
  } else {
    const topN  = parseInt(document.getElementById('trendTopN')?.value || 10);
    const kwAvg = Object.entries(kwMap).map(([kw, pts]) => {
      const vals = Object.values(pts);
      return { kw, avg: vals.reduce((s,v) => s+v, 0) / vals.length };
    }).sort((a,b) => b.avg - a.avg);
    topKws = kwAvg.slice(0, topN).map(x => x.kw);
    const cat = document.getElementById('trendCat')?.value || '';
    if (titleEl) titleEl.textContent = cat
      ? `Тренд: ${cat}`
      : 'Динаміка Google Trends (тижнева)';
  }

  const datasets = topKws.map((kw, i) => ({
    label: kw,
    data: weeks.map(w => kwMap[kw]?.[w] ?? null),
    borderColor: TREND_PALETTE[i % TREND_PALETTE.length],
    backgroundColor: TREND_PALETTE[i % TREND_PALETTE.length] + '22',
    borderWidth: _selectedKw ? 3 : 2,
    pointRadius: weeks.length > 30 ? 0 : 2,
    pointHoverRadius: 5,
    tension: 0.3,
    spanGaps: true,
  }));

  if (_trendsChart) _trendsChart.destroy();
  const ctx = document.getElementById('chTrends');
  if (!ctx) return;

  _trendsChart = new Chart(ctx, {
    type: 'line',
    data: { labels: weeks, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a24',
          borderColor: '#2a2a38',
          borderWidth: 1,
          titleColor: '#6b6b88',
          bodyColor: '#e8e8f0',
          callbacks: {
            label: c => ` ${c.dataset.label}: ${c.parsed.y ?? '—'}`
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color:'#6b6b88', font:{size:9}, maxTicksLimit:16,
            callback: (v,i) => weeks[i] ? weeks[i].slice(5) : ''
          },
          grid: { color:'rgba(42,42,56,.5)' }
        },
        y: {
          min:0, max:100,
          ticks: { color:'#6b6b88', font:{size:10} },
          grid: { color:'rgba(42,42,56,.5)' },
          title: { display:true, text:'Відносний інтерес (0–100)', color:'#6b6b88', font:{size:10} }
        }
      }
    }
  });

  const togglesEl = document.getElementById('trendKwToggles');
  if (togglesEl) {
    if (_selectedKw) {
      togglesEl.innerHTML = '';
    } else {
      togglesEl.innerHTML = topKws.map((kw, i) => {
        const c = TREND_PALETTE[i % TREND_PALETTE.length];
        return `<button onclick="toggleTrendKw(${i},this)"
          style="padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;
                 border:1.5px solid ${c};background:${c};color:#000;
                 font-family:'JetBrains Mono',monospace;transition:opacity .15s">${kw}</button>`;
      }).join('');
    }
  }

  const infoEl = document.getElementById('trendsChartInfo');
  if (infoEl) infoEl.textContent = `${topKws.length} ключів · ${weeks.length} тижнів`;
}

window.toggleTrendKw = (idx, btn) => {
  if (!_trendsChart) return;
  const visible = _trendsChart.isDatasetVisible(idx);
  if (visible) { _trendsChart.hide(idx); btn.style.opacity = '0.3'; }
  else         { _trendsChart.show(idx); btn.style.opacity = '1';   }
};

function buildCatGrid() {
  const el = document.getElementById('trendCatGrid');
  if (!el) return;

  const cat = document.getElementById('trendCat')?.value || '';
  if (cat) { el.style.display = 'none'; return; }
  el.style.display = '';

  // Group by parent_category → set of keywords
  const groups = {};
  (_trendsRaw || []).forEach(r => {
    const c = r.parent_category || r.category || 'Інше';
    if (!groups[c]) groups[c] = { kws: new Set(), vals: [] };
    groups[c].kws.add(r.keyword);
    const v = parseInt(r.value) || 0;
    if (v) groups[c].vals.push(v);
  });

  const sorted = Object.keys(groups).sort();

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:8px">
      ${sorted.map(c => {
        const g   = groups[c];
        const avg = g.vals.length ? Math.round(g.vals.reduce((s,v)=>s+v,0)/g.vals.length) : 0;
        const safe = c.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return `
        <div class="table-wrap"
          onclick="filterByCat('${safe}')"
          style="padding:14px 16px;cursor:pointer;transition:border-color .15s"
          onmouseenter="this.style.borderColor='var(--accent)'"
          onmouseleave="this.style.borderColor=''">
          <div style="font-size:10px;color:var(--muted);margin-bottom:6px;
                      text-transform:uppercase;letter-spacing:.06em;
                      white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c}</div>
          <div style="font-size:20px;font-weight:700;color:var(--accent);line-height:1">${g.kws.size}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">ключів</div>
          ${avg ? `<div style="font-size:10px;color:var(--accent2);margin-top:4px">∅ інтерес: ${avg}</div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
}

function buildTrendsTable() {
  const data   = _trendsFiltered();
  const search = (document.getElementById('trendSearch')?.value || '').toLowerCase();

  const kwMap = {};
  data.forEach(r => {
    const kw = r.keyword;
    if (!kw || !r.week_date) return;   // пропускаємо некоректні рядки
    if (!kwMap[kw]) kwMap[kw] = { vals:[], dates:[], cat: r.category||'', par: r.parent_category||'' };
    kwMap[kw].vals.push(parseInt(r.value) || 0);
    kwMap[kw].dates.push(r.week_date);
  });

  let rows = Object.entries(kwMap).map(([kw, d]) => {
    const vals    = d.vals;
    const avg     = vals.reduce((s,v)=>s+v,0) / vals.length;
    const maxV    = Math.max(...vals);
    const maxIdx  = vals.indexOf(maxV);
    const peakWk  = d.dates[maxIdx] || '';
    const sorted  = d.dates
      .map((dt,i) => ({dt, v: vals[i]}))
      .filter(x => x.dt)
      .sort((a,b) => (a.dt||'').localeCompare(b.dt||''));
    const n       = sorted.length;
    const take    = Math.min(4, Math.floor(n/2)) || 1;
    const firstAvg = sorted.slice(0,take).reduce((s,x)=>s+x.v,0)/take;
    const lastAvg  = sorted.slice(-take).reduce((s,x)=>s+x.v,0)/take;
    const dir = lastAvg > firstAvg*1.12 ? 'up' : lastAvg < firstAvg*0.88 ? 'down' : 'flat';
    const vol = _kwVolume[kw] || 0;
    return { kw, avg, maxV, peakWk, dir, cat: d.cat, par: d.par, vol };
  });

  if (search) rows = rows.filter(r =>
    r.kw.toLowerCase().includes(search) ||
    r.cat.toLowerCase().includes(search) ||
    r.par.toLowerCase().includes(search)
  );
  rows.sort((a,b) => b.vol !== a.vol ? b.vol - a.vol : b.avg - a.avg);

  document.getElementById('trendsTableCount').textContent = `${rows.length} ключів`;

  const dirHtml = d => d==='up'
    ? '<span class="trend-dir-up">▲ зростає</span>'
    : d==='down'
    ? '<span class="trend-dir-down">▼ падає</span>'
    : '<span class="trend-dir-flat">— стабільно</span>';

  const barHtml = avg => `<div style="display:flex;align-items:center;gap:6px">
    <div style="width:70px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0">
      <div style="width:${Math.min(avg,100).toFixed(0)}%;height:100%;background:var(--accent2);border-radius:2px"></div>
    </div>
    <span style="font-variant-numeric:tabular-nums">${avg.toFixed(0)}</span>
  </div>`;

  const hasVolume = rows.some(r => r.vol > 0);
  document.getElementById('trendsTableBody').innerHTML = rows.length ? `
    <table>
      <thead><tr>
        <th>#</th>
        <th>Ключ</th>
        <th>Батьківська категорія</th>
        <th>Категорія</th>
        ${hasVolume ? '<th class="num">Частотність</th>' : ''}
        <th class="num">Сер. інтерес</th>
        <th class="num">Пік</th>
        <th>Тиждень піку</th>
        <th class="num">Тренд</th>
        <th></th>
      </tr></thead>
      <tbody>${rows.map((r,i) => {
        const safe = r.kw.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        const volCell = hasVolume
          ? `<td class="num" style="color:var(--accent2);font-variant-numeric:tabular-nums">${r.vol ? fmtNum(r.vol) : '<span style="color:var(--muted)">—</span>'}</td>`
          : '';
        return `<tr>
        <td style="color:var(--muted);font-size:11px">${i+1}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          <a href="https://trends.google.com/trends/explore?q=${encodeURIComponent(r.kw)}&geo=UA"
             target="_blank" style="color:var(--accent);text-decoration:none">${r.kw}</a>
        </td>
        <td style="font-size:11px;color:var(--muted)">${r.par}</td>
        <td style="font-size:11px;color:var(--muted)">${r.cat}</td>
        ${volCell}
        <td class="num">${barHtml(r.avg)}</td>
        <td class="num" style="color:var(--text)">${r.maxV}</td>
        <td style="font-size:11px;color:var(--muted)">${r.peakWk}</td>
        <td class="num">${dirHtml(r.dir)}</td>
        <td>
          <button onclick="selectKeyword('${safe}')"
            style="padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;
                   border:1px solid var(--accent2);background:transparent;color:var(--accent2);
                   font-family:'JetBrains Mono',monospace;white-space:nowrap">📈 графік</button>
        </td>
      </tr>`;
      }).join('')}</tbody>
    </table>`
    : '<div class="empty">Нічого не знайдено</div>';
}
</script>
</body>
</html>
